name: Main Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  checks:
    uses: ./.github/workflows/workspace-checks.yml

  release:
    name: Publish and tag coordinated release
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Internal packages are published to GitHub Packages, not public npmjs.
          registry-url: https://npm.pkg.github.com
          scope: "@edwardseshoka"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate coordinated version and read release metadata
        id: release_version
        run: node ./scripts/release-version.mjs --github-output "$GITHUB_OUTPUT"

      - name: Detect existing tag and publish state
        id: release_state
        env:
          RELEASE_TAG: ${{ steps.release_version.outputs.release_tag }}
          RELEASE_VERSION: ${{ steps.release_version.outputs.release_version }}
          PACKAGE_NAMES: ${{ steps.release_version.outputs.package_names }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          git fetch --tags --force

          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

          IFS=',' read -r -a PKGS <<< "$PACKAGE_NAMES"
          present_count=0
          missing_count=0

          for pkg in "${PKGS[@]}"; do
            if npm view "${pkg}@${RELEASE_VERSION}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
              present_count=$((present_count + 1))
            else
              missing_count=$((missing_count + 1))
            fi
          done

          if [ "$present_count" -gt 0 ] && [ "$missing_count" -gt 0 ]; then
            echo "Release ${RELEASE_VERSION} is partially published; refusing to continue." >&2
            exit 1
          fi

          if [ "$present_count" -gt 0 ] && [ "$missing_count" -eq 0 ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish workspaces
        if: steps.release_state.outputs.tag_exists == 'false' && steps.release_state.outputs.already_published == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --workspaces

      - name: Create and push release tag
        if: steps.release_state.outputs.tag_exists == 'false'
        env:
          RELEASE_TAG: ${{ steps.release_version.outputs.release_tag }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"
