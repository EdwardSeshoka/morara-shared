name: Main Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  checks:
    uses: ./.github/workflows/workspace-checks.yml

  release:
    name: Version and publish workspaces
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@edwardseshoka"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create version PR or publish release
        uses: changesets/action@v1
        with:
          version: npm run version:packages
          publish: npm run release
          title: "Version packages"
          commit: "Version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_TOKEN || secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.CHANGESETS_TOKEN || secrets.GITHUB_TOKEN }}
