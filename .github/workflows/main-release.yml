name: Main Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    uses: ./.github/workflows/workspace-checks.yml

  publish-guard:
    name: Detect publishable changes
    runs-on: ubuntu-latest
    needs: checks
    outputs:
      should_publish: ${{ steps.changes.outputs.should_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed files
        id: changes
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            RANGE="$AFTER^..$AFTER"
          else
            RANGE="$BEFORE..$AFTER"
          fi

          if git diff --name-only "$RANGE" | grep -Eq '^(packages/|package\.json|package-lock\.json)'; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    needs:
      - checks
      - publish-guard
    if: needs.publish-guard.outputs.should_publish == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish workspaces
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspaces --access restricted
